# =============================================================================
# Monthly Data Rebuild — Re-ingest CNB regulatory data and rebuild Docker image
# =============================================================================
#
# Runs on the 1st of each month at 02:00 UTC.
# Also available via manual dispatch.
#
# On success, commits the updated data/ingest-state.json and triggers a
# new Docker image build via the ghcr-build workflow.
#
# Requires: CNB website access from GitHub Actions runners (public data).
# =============================================================================

name: Monthly Data Rebuild

on:
  schedule:
    - cron: "0 2 1 * *"
  workflow_dispatch:

jobs:
  rebuild:
    name: Re-ingest CNB Data
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ingest
        run: npm run ingest
        timeout-minutes: 30

      - name: Build TypeScript
        run: npm run build

      - name: Commit updated ingest state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ingest-state.json data/cnb.db
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: monthly data rebuild $(date -u +%Y-%m-%d)"
            git push
          fi
